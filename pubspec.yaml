name: refactor_template
description: "Sistema de Posgrado UPEA - Plataforma educativa optimizada"
publish_to: "none"
version: 0.2.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI y Navegación
  cupertino_icons: ^1.0.8
  rive: ^0.13.0
  flutter_svg: ^2.0.9
  go_router: ^17.0.0
  animate_do: ^4.2.0
  font_awesome_flutter: ^10.12.0
  
  # Estado y Configuración
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.0
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.5.3
  
  # Networking
  dio: ^5.9.0
  cached_network_image: ^3.3.0
  
  # Utilidades
  url_launcher: ^6.2.5
  path_provider: ^2.1.5
  connectivity_plus: ^6.0.5
  path: ^1.9.0
  
  # Documentos y Archivos
  pdf: ^3.11.0
  webview_flutter: ^4.13.1
  printing: ^5.12.0
  file_picker: ^10.3.8
  open_filex: ^4.5.0
  share_plus: ^10.1.4
  
  # Cámara y OCR
  image_picker: ^1.1.2
  camera: ^0.11.0
  image: ^4.1.7
  image_background_remover: ^2.0.0
  # serious_python: ^0.9.9  # Opcional: descomenta y configura SERIOUS_PYTHON_SITE_PACKAGES para OCR embebido
  flutter_native_ocr: ^0.1.0  # OCR nativo con Vision (iOS) y ML Kit v2 (Android) - Mayor precisión
  google_mlkit_text_recognition: ^0.15.0  # Mantenido para compatibilidad con servicios existentes
  google_mlkit_face_detection: ^0.13.1
  blinkid_flutter: ^7.6.1
  scanbot_sdk: ^7.1.1
  google_gemini: ^0.1.2
  
  # Seguridad
  local_auth: ^3.0.0
  permission_handler: ^12.0.1
  
  # Notificaciones
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.10.4
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:

    #Teseract OCR 
    - assets/tessdata/
    - assets/tessdata/tessdata_config.json
    # Avatares y fondos
    - assets/avaters/
    - assets/Backgrounds/
    
    # Iconos y elementos UI
    - assets/icons/
    - assets/RiveAssets/
    
    # Imágenes del sistema
    - assets/images/
    
    # Plantillas HTML
    - assets/templates/
    
    # Licencias y configuración
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/Fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/Fonts/Inter-SemiBold.ttf
          weight: 600
    - family: Poppins
      fonts:
        - asset: assets/Fonts/Poppins-Bold.ttf
          weight: 700
    - family: Parisienne
      fonts:
        - asset: assets/Fonts/Parisienne-Regular.ttf
          weight: 400

# Generar icono de la app desde una sola imagen:
# 1. Pon tu logo (1024x1024 px) en assets/images/ (ej. logo_app.png) y ajusta image_path abajo.
# 2. Ejecuta: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoposgrado.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logoposgrado.jpg"


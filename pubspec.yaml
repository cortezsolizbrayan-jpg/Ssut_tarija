name: refactor_template
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  rive: ^0.13.0
  flutter_svg: ^2.0.9
  flutter_dotenv: ^6.0.0
  go_router: ^17.0.0
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  animate_do: ^4.2.0
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.0
  font_awesome_flutter: ^10.12.0
  url_launcher: ^6.2.5
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0
  pdf: ^3.11.0
  printing: ^5.12.0
  local_auth: ^3.0.0
  google_mlkit_text_recognition: ^0.15.0
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.13.1
  permission_handler: ^12.0.1
  image: ^4.1.7
  file_picker: ^10.3.8
  open_filex: ^4.5.0
  share_plus: ^10.1.4
  google_gemini: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.10.4
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/avaters/
    - assets/Backgrounds/
    - assets/icons/
    - assets/RiveAssets/
    - assets/images/
    - assets/svg/
    - .env

  fonts:
    - family: Intel
      fonts:
        - asset: assets/Fonts/Inter-Regular.ttf
        - asset: assets/Fonts/Inter-SemiBold.ttf
          weight: 600
    - family: Poppins
      fonts:
        - asset: assets/Fonts/Poppins-Bold.ttf
          weight: 700
    # Fuente manuscrita para el lema \"Democratizando la educación...\"
    # Asegúrate de colocar el archivo en assets/Fonts/Parisienne-Regular.ttf
    - family: Parisienne
      fonts:
        - asset: assets/Fonts/Parisienne-Regular.ttf

name: refactor_template
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  rive: ^0.13.12
  flutter_svg: ^2.0.10
  flutter_dotenv: ^6.0.0
  go_router: ^17.0.0
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  animate_do: ^3.3.4
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  font_awesome_flutter: ^10.12.0
  url_launcher: ^6.2.5
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  local_auth: ^2.3.0
  google_mlkit_text_recognition: ^0.14.0
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.12.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  build_runner: ^2.10.4
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/avaters/
    - assets/Backgrounds/
    - assets/icons/
    - assets/RiveAssets/
    - assets/images/
    - assets/svg/
    - .env

  fonts:
    - family: Intel
      fonts:
        - asset: assets/Fonts/Inter-Regular.ttf
        - asset: assets/Fonts/Inter-SemiBold.ttf
          weight: 600
    - family: Poppins
      fonts:
        - asset: assets/Fonts/Poppins-Bold.ttf
          weight: 700
    # Fuente manuscrita para el lema \"Democratizando la educación...\"
    # Asegúrate de colocar el archivo en assets/Fonts/Parisienne-Regular.ttf
    - family: Parisienne
      fonts:
        - asset: assets/Fonts/Parisienne-Regular.ttf
